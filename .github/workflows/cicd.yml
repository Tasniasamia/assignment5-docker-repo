name: CI-CD

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

env:
  REGISTRY: docker.io

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive 
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install server deps
        working-directory: ./assignment_4-level-2-backend-
        run: npm ci

      - name: Lint server
        working-directory: ./assignment_4-level-2-backend-
        run: npm run lint

      - name: Generate Prisma client
        working-directory: ./assignment_4-level-2-backend-
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run generate

      - name: Build server
        working-directory: ./assignment_4-level-2-backend-
        run: npm run build

      - name: Install client deps
        working-directory: ./assignment_4-level-2-frontend-
        run: npm ci

      - name: Lint client
        working-directory: ./assignment_4-level-2-frontend-
        run: npm run lint

      - name: Build client
        working-directory: ./assignment_4-level-2-frontend-
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.CLIENT_PUBLIC_API_BASE_URL }}
        run: npm run build

  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Normalize image namespace
        id: vars
        shell: bash
        run: |
          echo "namespace=${{ secrets.DOCKERHUB_USERNAME }}" >> "$GITHUB_OUTPUT"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./assignment_4-level-2-backend-
          file: ./assignment_4-level-2-backend-/Dockerfile
          push: true
          tags: |
            docker.io/${{ steps.vars.outputs.namespace }}/ph-server:latest
            docker.io/${{ steps.vars.outputs.namespace }}/ph-server:${{ github.sha }}

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./assignment_4-level-2-frontend-
          file: ./assignment_4-level-2-frontend-/Dockerfile
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.CLIENT_PUBLIC_API_BASE_URL }}
          push: true
          tags: |
            docker.io/${{ steps.vars.outputs.namespace }}/ph-client:latest
            docker.io/${{ steps.vars.outputs.namespace }}/ph-client:${{ github.sha }}

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: docker
    environment: production

    steps:
      - name: Normalize image namespace
        id: vars
        shell: bash
        run: |
          echo "namespace=${{ secrets.DOCKERHUB_USERNAME }}" >> "$GITHUB_OUTPUT"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            APP_DIR="${{ secrets.VPS_APP_DIR }}"

            if [ -z "$APP_DIR" ]; then
              echo "VPS_APP_DIR secret is empty."
              exit 1
            fi

            if [ ! -d "$APP_DIR" ]; then
              echo "VPS_APP_DIR does not exist: $APP_DIR"
              exit 1
            fi

            cd "$APP_DIR"

            if [ -d .git ]; then
              git fetch --all --prune
              git checkout main
              git reset --hard ${{ github.sha }}
            fi

            printf '%s' "${{ secrets.SERVER_ENV_PRODUCTION }}" > ./assignment_4-level-2-backend-/.env

            export REGISTRY=docker.io
            export IMAGE_NAMESPACE=${{ steps.vars.outputs.namespace }}
            export IMAGE_TAG=${{ github.sha }}
            export POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login docker.io -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            docker compose -f docker-compose.yml pull
            docker compose -f docker-compose.yml up -d ph-db
            docker compose -f docker-compose.yml up -d ph-server ph-client
            docker image prune -f